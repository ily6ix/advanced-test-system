{% extends "candidate_base.html" %}

{% block content %}
    <h2>Profile</h2>
    <p>Update your personal information and settings.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div style="padding: 0.75rem; margin-bottom: 1rem; border-radius: 8px; background: {% if category == 'success' %}#d4edda{% else %}#f8d7da{% endif %}; color: {% if category == 'success' %}#155724{% else %}#856404{% endif %};">
            {{ msg }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Profile form -->
    <form method="post" style="max-width: 500px; margin-top: 2rem;">
        <div style="margin-bottom: 1.5rem;">
            <label for="full_name" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Full Name:</label>
            <input type="text" id="full_name" name="full_name" value="{{ candidate.get_full_name }}" required style="width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem;">
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Email:</label>
            <input type="email" id="email" name="email" value="{{ candidate.email }}" required style="width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem;">
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">New Password (leave blank to keep current):</label>
            <input type="password" id="password" name="password" style="width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem;">
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Role:</label>
            <input type="text" value="{{ candidate.role }}" disabled style="width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; background: #f5f5f5; color: #666;">
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Status:</label>
            <input type="text" value="{% if candidate.is_active %}Active{% else %}Inactive{% endif %}" disabled style="width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; background: #f5f5f5; color: #666;">
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Last Login:</label>
            <input type="text" value="{% if candidate.last_login %}{{ candidate.last_login | replace('T', ' ') | truncate(19, True, '') }}{% else %}Never{% endif %}" disabled style="width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; background: #f5f5f5; color: #666;">
        </div>

        <button class="btn btn-primary" type="submit">Save Changes</button>
    </form>
{% endblock %}
