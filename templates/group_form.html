{% extends "admin_base.html" %}

{% block content %}
<section class="section">
    <h2>{{ 'Add' if action == 'add' else 'Edit' }} Group</h2>

    <form method="post">
        <label>Group Name:<br>
            <input type="text" name="name" value="{{ group.name or '' }}" required>
        </label><br><br>

        <label>Description:<br>
            <textarea name="description" rows="3">{{ group.description or '' }}</textarea>
        </label><br><br>

        <label>Members (Candidates):<br>
            <div style="max-height:200px; overflow:auto; border:1px solid #ddd; padding:1rem;">
                {% for u in users %}
                <label style="display:block;">
                    <input type="checkbox" name="members" value="{{ u.id }}" {% if u.id in (group.members or []) %}checked{% endif %}>
                    {{ u.get_full_name }} &lt;{{ u.email }}&gt;
                </label>
                {% endfor %}
            </div>
        </label><br><br>

        <button class="btn btn-secondary" type="submit">
            {{ 'Add Group' if action == 'add' else 'Save Changes' }}
        </button>

        <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">Cancel</a>
    </form>
</section>
{% endblock %}
